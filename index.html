<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
</head>
<body>
  <h2>Restricted Area</h2>
  <input type="text" id="userId" placeholder="Write your ID">
  <button onclick="verifyID()">Login</button>
  <p id="result"></p>

  <script>
    async function verifyID() {
      const id = document.getElementById("userId").value;
      const url = "https://script.google.com/macros/s/AKfycbwIcsHldYno-6C4tX9yyDNdZI6sE-FCxq_WWva4Isx5M5ordl4WXoxVByAPl_ggUfU6Yw/exec?id=" + encodeURIComponent(id);

      try {
        const response = await fetch(url);
        const text = await response.text();

        if (text.startsWith("welcome:")) {
          const nickname = text.split(":")[1];
          document.getElementById("result").innerHTML = `✅ Welcome, ${nickname}! <a href="https://lookerstudio.google.com/reporting/d7f5975a-4af1f-1f5b8d1832fbOpen Report</a>`;
        } else {
          document.getElementById("result").innerHTML = "❌ Access not authorized.";
        }
      } catch (error) {
        document.getElementById("result").innerHTML = "❌ Error connecting to server.";
      }
    }
  </script>
</body>
</html>
